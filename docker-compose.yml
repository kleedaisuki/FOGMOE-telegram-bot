version: "3.9"

services:
  bot:
    build: .
    image: fogmoe-telegram-bot:latest
    env_file:
      - .env
    environment:
      # 让容器使用宿主机/外部数据库；根据你的 PostgreSQL 地址修改
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
    volumes: [] # 如需落盘日志，改为下方注释形式
    # volumes:
    #   - ./logs:/app/logs
    restart: unless-stopped
    # 如需使用代理，可在此添加 extra_hosts 或网络设置
