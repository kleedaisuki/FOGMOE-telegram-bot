services:
  bot:
    build: .
    image: fogmoe-telegram-bot:latest
    # 配置含有密钥；由操作者在仓库根目录维护，绝不烘焙进镜像。
    # outbox artifact、跨进程媒体限流状态与日志必须跨容器重建保留。
    volumes:
      - ./config.json:/app/config.json:ro
      - fogmoe-runtime:/app/logs
    # 必须覆盖 BotRuntime 默认 180 秒 drain grace，并为外围资源关闭保留缓冲。
    stop_grace_period: 200s
    restart: unless-stopped
    # 如需使用代理，可在此添加 extra_hosts 或网络设置

volumes:
  fogmoe-runtime:
